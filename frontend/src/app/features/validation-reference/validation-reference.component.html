<app-page-shell
  title="Validation reference"
  subtitle="Every check, scope, and threshold the validator applies."
  activeRoute="validation_reference"
  (navigate)="onShellNavigate($event)"
>
  <div class="ref-list">
    @for (section of sections; track section.category) {
      <div class="mv-card section-card">
        <div class="section-head">{{ section.category }}</div>
        <table class="ref-table">
          <thead>
            <tr>
              <th>Check</th>
              <th>Scope</th>
              <th>Pass</th>
              <th>Warn</th>
              <th>Fail</th>
            </tr>
          </thead>
          <tbody>
            @for (check of section.checks; track check.name) {
              <tr>
                <td class="col-name">{{ check.name }}</td>
                <td class="col-scope">{{ check.scope }}</td>
                <td class="col-pass">{{ check.pass }}</td>
                <td class="col-warn">{{ check.warn }}</td>
                <td class="col-fail">{{ check.fail }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</app-page-shell>
