@switch (appState()) {
  @case ('login') {
    <app-login (authenticated)="onAuthenticated($event)" />
  }
  @case ('site_selector') {
    <app-site-selector
      [authInfo]="authInfo()!"
      [selectedOrg]="selectedOrg()"
      (orgSelected)="selectedOrg.set($event)"
      (reportStarted)="onReportStarted($event)"
      (showReference)="appState.set('validation_reference')"
    />
  }
  @case ('validation_reference') {
    <app-validation-reference (back)="appState.set('site_selector')" />
  }
  @case ('report') {
    <app-report-view
      [jobId]="activeJobId()!"
      (back)="appState.set('site_selector')"
    />
  }
}
