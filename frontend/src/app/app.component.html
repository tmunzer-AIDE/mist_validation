@switch (appState()) {
  @case ('login') {
    <app-login (authenticated)="onAuthenticated($event)" />
  }
  @case ('site_selector') {
    <app-site-selector
      [authInfo]="authInfo()!"
      [selectedOrg]="selectedOrg()"
      (orgSelected)="selectedOrg.set($event)"
      (reportStarted)="onReportStarted($event)"
      (showReference)="pushState('validation_reference')"
    />
  }
  @case ('validation_reference') {
    <app-validation-reference (back)="showSiteSelector()" />
  }
  @case ('report') {
    <app-report-view
      [jobId]="activeJobId()!"
      (back)="showSiteSelector()"
    />
  }
  @case ('org_report') {
    <app-org-report-view
      [jobId]="activeJobId()!"
      (back)="showSiteSelector()"
    />
  }
}
